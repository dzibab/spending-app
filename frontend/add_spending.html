<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/styles.css">
    <title>Add Spending</title>
</head>
<body>
    <h1>Add Spending</h1>

    <form id="spendingForm">
        <input type="text" id="description" placeholder="Description">
        <input type="number" step="0.01" id="amount" placeholder="Amount" required>
        <input type="date" id="date" required>
        <input type="text" id="currency" placeholder="Currency (e.g., USD)" required>
        <input type="text" id="category" placeholder="Category (e.g., Food)" required>
        <button type="submit">Add Spending</button>
    </form>
    <script src="static/js/script.js"></script>
</body>
</html>
